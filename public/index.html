<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Application with mindAR & A-Frame</title>
  <base href="./">
  <script src="https://unpkg.com/three@r128/build/three.min.js"></script>
  <script src="https://unpkg.com/aframe@1.4.2/dist/aframe-master.min.js"></script>
  <script>
    AFRAME.registerComponent('freeze-yz', {
      schema: {
        y: { type: 'number', default: 0 },
        z: { type: 'number', default: 0 },
        enabled: { type: 'boolean', default: false }
      },
      init: function () {
        this.prev = { y: null, z: null };
      },
      tick: function () {
        if (!this.data.enabled) return;
        const rot = this.el.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
        // Only write if changed to avoid infinite loops
        if (rot.y !== this.data.y || rot.z !== this.data.z) {
          this.el.setAttribute('rotation', { x: rot.x, y: this.data.y, z: this.data.z });
        }
      }
    });
  </script>
  <script src="mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    a-scene {
      width: 100%;
      height: 100vh;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>
<body>
  
  <a-scene mindar-image="imageTargetSrc: assets/target-images/targets.mind; autostart: true; filterMinCF: 0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <!-- <a-assets>
      <a-asset-item id="model" src="./assets/model.glb"></a-asset-item>
    </a-assets> -->

    <!-- <a-box id="model" color="blue" position="0 0 0" scale="0.5 0.5 0.5"></a-box> -->

    <!-- Assets -->
    <a-assets>
      <a-asset-item id="bull-head-model" src="assets/BullHead.glb"></a-asset-item>
      <video id="video-screen" autoplay loop muted playsinline preload="auto" style="display: none;">
        <source src="assets/promo.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </a-assets>
    
    <!-- Camera -->
     <a-camera position="0 0 0" look-controls="enabled: false" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>
    <!-- <a-camera position="0 0 0" look-controls="enabled: false"></a-camera> -->

    <!-- Target Image 1 -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
      <!-- 3D Bull Head model, hidden until target detection -->
      <a-gltf-model id="bull-head-entity" src="#bull-head-model" position="0 0 0" rotation="10 0 0" scale="0.9 0.9 0.9" visible="false" freeze-yz="y: 10; z: 0; enabled: false"></a-gltf-model>

      <!-- Video Plane - positioned vertically above target (9:16 ratio) -->
      <!-- <a-plane position="0 1.5 0" rotation="90 0 0" scale="0.9 1.6 1" material="src: #video-screen; transparent: true;" id="video-plane"></a-plane> -->
<!-- <a-plane position="0 1.4 0.009" rotation="90 0 0" scale="0.95 0.95 0.95" color="#FF0000"></a-plane> -->

       <!-- <a-plane position="0 1.4 0.01" rotation="90 0 0" scale="0.9 0.9 0.9" material="src: #video-screen; transparent: true;" id="video-plane"></a-plane>       -->
        <!-- Base plane: Acts as the CSS-styled background border -->
      <a-plane id="video-base-plane" color="#FFD700" rotation="0 0 0" position="0 1.3 -0.1" scale=".8 .8 .8" freeze-yz="y: 90; z: 0; enabled: false">
      <!-- Video plane: Offset forward by 0.002 to kill z-fighting -->
      <a-video src="#video-screen" material="shader: flat;" rotation="0 0 0" position="0 0 0.002" scale="0.9 0.9 1"></a-video>

      <a-text value="T. Dharmaraj" 
                  color="#FFFFFF" 
                  align="center" 
                  position="0 -0.3 0.02"
                  width="1.3"
                  rotation="0 0 0">
          </a-text>
    </a-plane>
    </a-entity>
    
    
  </a-scene>

  <div class="info">
    <p>Point camera at the Jallikattu cover image</p>
    <p id="status"></p>
    <button id="cameraBtn" style="margin-top: 10px; padding: 10px 20px; background: #4ECDC4; color: white; border: none; border-radius: 5px; cursor: pointer;">Enable Camera</button>
  </div>

  <script>
    let userGestureAllowed = false;

    // Request camera permission explicitly
    function requestCameraPermission() {
      console.log('Requesting camera permission...');
      
      // Check if getUserMedia is available
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        console.error('getUserMedia not supported');
        document.getElementById('status').textContent = '✗ Camera not supported. Try different browser/device';
        return;
      }

      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment' },
        audio: false 
      })
        .then((stream) => {
          console.log('✓ Camera permission granted');
          document.getElementById('cameraBtn').style.display = 'none';
          userGestureAllowed = true;

          const videoElement = document.querySelector('#video-screen');
          if (videoElement) {
            videoElement.muted = true;
            videoElement.volume = 1;
            videoElement.play().then(() => {
              console.log('✓ Video autoplayed after camera permission');
            }).catch((e) => {
              console.warn('Video autoplay after camera permission failed:', e);
            });
          }

          // Don't stop the stream - keep it for mindar
        })
        .catch((error) => {
          console.error('✗ Camera error:', error.name, error.message);
          let errorMsg = error.message || error.name;
          document.getElementById('status').textContent = '✗ Camera Error: ' + errorMsg;
          alert('Camera Error: ' + errorMsg);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
      console.log('Page loaded - DOM ready');
      
      const statusDiv = document.getElementById('status');
      const cameraBtn = document.getElementById('cameraBtn');
      
      if (statusDiv) {
        // statusDiv.textContent = 'Click "Enable Camera" to start';
      }
      
      // Add click handler to button
      if (cameraBtn) {
        cameraBtn.addEventListener('click', () => {
          console.log('User clicked enable camera');
          requestCameraPermission();
        });
      }
      
      // Auto-request camera permission on load
      console.log('Auto-requesting camera permission...');
      setTimeout(requestCameraPermission, 1000);
      
      const scene = document.querySelector('a-scene');
      if (!scene) {
        console.error('A-Frame scene not found!');
        return;
      }

      document.querySelector('video').style.border = '5px solid black';
      
      // Log when mindar is ready
      scene.addEventListener('ready', () => {
        console.log('✓ AR Scene ready - mindar initialized');
        document.getElementById('status').textContent = '✓ AR Ready - Point at target';
      });
      
      scene.addEventListener('arReady', () => {
        console.log('✓ AR system fully ready');
        // document.getElementById('status').innerHTML += '<br>AR system ready. Looking for target...';
      });
      
      // Log target detection with more detail
      scene.addEventListener('targetFound', (event) => {
        console.log('✓✓✓ COVER FOUND! ✓✓✓', event);
        document.getElementById('status').textContent = '✓✓✓ COVER DETECTED! ✓✓✓';
        
        // Play video when target is detected
        const videoElement = document.querySelector('#video-screen');
        if (videoElement) {
          if (userGestureAllowed) {
            videoElement.muted = false;
          }
          videoElement.play().catch(e => console.error('Video play failed:', e));
          console.log('✓ Video playing', { muted: videoElement.muted });
        }

        // SHOW THE BullHead model WHEN DETECTED
        const bullHeadEntity = document.querySelector('#bull-head-entity');
        const videoBase = document.querySelector('#video-base-plane');
        if (bullHeadEntity) {
          bullHeadEntity.setAttribute('visible', 'true');
          // clamp Y and Z rotation to current values
          const r = bullHeadEntity.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
          bullHeadEntity.setAttribute('freeze-yz', { y: r.y, z: r.z, enabled: true });
          document.getElementById('status').textContent = '✓✓✓ BULL HEAD DETECTED! ✓✓✓';
        }
        if (videoBase) {
          const vr = videoBase.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
          videoBase.setAttribute('freeze-yz', { y: vr.y, z: vr.z, enabled: true });
        }
      });
      
      scene.addEventListener('targetLost', (event) => {
        console.log('✗ Target lost', event);
        document.getElementById('status').textContent = '⏳ Searching for Cover...';
        
        // Pause video when target is lost
        const videoElement = document.querySelector('#video-screen');
        if (videoElement) {
          videoElement.pause();
          console.log('✓ Video paused');
        }

        // Hide BullHead model when the target is lost
        const bullHeadEntity = document.querySelector('#bull-head-entity');
        const videoBase = document.querySelector('#video-base-plane');
        if (bullHeadEntity) {
          bullHeadEntity.setAttribute('visible', 'false');
          bullHeadEntity.setAttribute('freeze-yz', { enabled: false });
        }
        if (videoBase) {
          videoBase.setAttribute('freeze-yz', { enabled: false });
        }
      });
      
      // Log errors
      scene.addEventListener('error', (e) => {
        console.error('Scene error:', e);
        document.getElementById('status').textContent = '✗ AR Error';
      });
    });
  </script>
</body>
</html>
