<!DOCTYPE html>
<html>
<head>
  <title>Simple Check</title>
</head>
<body>
  <h1>Browser Check</h1>
  <pre id="output">Loading...</pre>

  <script>
    let output = '';
    
    // Check navigator object
    output += 'navigator exists: ' + (typeof navigator !== 'undefined') + '\n';
    output += 'navigator.mediaDevices exists: ' + (typeof navigator.mediaDevices !== 'undefined') + '\n';
    output += 'navigator.mediaDevices.getUserMedia exists: ' + (typeof navigator.mediaDevices?.getUserMedia !== 'undefined') + '\n';
    
    // Browser info
    output += '\nBrowser: ' + navigator.userAgent + '\n';
    
    // Try to access it
    try {
      if (navigator && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        output += '\n✓ Camera API is available!\n';
      } else {
        output += '\n✗ Camera API is NOT available\n';
        output += 'navigator: ' + JSON.stringify(typeof navigator) + '\n';
        if (navigator) {
          output += 'navigator keys: ' + Object.keys(navigator).slice(0, 10).join(', ') + '...\n';
          output += 'mediaDevices in navigator: ' + ('mediaDevices' in navigator) + '\n';
        }
      }
    } catch (e) {
      output += '\n✗ Error checking API: ' + e.message + '\n';
    }
    
    document.getElementById('output').textContent = output;
    console.log(output);
  </script>
</body>
</html>
