<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      background: #333;
      color: white;
    }
    video {
      width: 100%;
      max-width: 600px;
      border: 2px solid cyan;
      margin: 20px 0;
    }
    button {
      padding: 15px 30px;
      font-size: 16px;
      background: #4ECDC4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 5px 10px 0;
    }
    button:hover {
      background: #3BAE9D;
    }
    #status {
      margin: 20px 0;
      padding: 15px;
      background: #1a1a1a;
      border-left: 4px solid #4ECDC4;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Camera Permission Test</h1>
  
  <button id="startBtn">Start Camera</button>
  <button id="stopBtn">Stop Camera</button>
  
  <div id="status">Status: Waiting for input...</div>
  
  <video id="video" autoplay playsinline></video>

  <script>
    const statusDiv = document.getElementById('status');
    const videoElement = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    
    let stream = null;

    function updateStatus(message) {
      console.log(message);
      statusDiv.innerHTML = message.replace(/\n/g, '<br>');
    }

    function logEnvironment() {
      let info = `
        <strong>Device Info:</strong><br>
        Browser: ${navigator.userAgent}<br>
        <br>
        <strong>Camera API:</strong><br>
        navigator: ${navigator ? '✓ exists' : '✗ missing'}<br>
        navigator.mediaDevices: ${navigator.mediaDevices ? '✓ exists' : '✗ missing'}<br>
        getUserMedia: ${navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? '✓ exists' : '✗ missing'}<br>
        <br>
        <strong>Security:</strong><br>
        Secure Context (HTTPS): ${window.isSecureContext ? '✓ Yes' : '⚠ No (may limit camera access)'}<br>
        <br>
        Ready to request camera. Click "Start Camera" button.
      `;
      updateStatus(info);
    }

    startBtn.addEventListener('click', async () => {
      updateStatus('⏳ Requesting camera access...<br>Watch for permission popup on your screen...');
      
      try {
        // Check if API exists
        if (!navigator.mediaDevices) {
          throw new Error('navigator.mediaDevices is not available');
        }
        if (!navigator.mediaDevices.getUserMedia) {
          throw new Error('getUserMedia is not available');
        }

        const constraints = {
          video: { 
            facingMode: 'environment'
          },
          audio: false
        };
        
        console.log('Requesting with constraints:', constraints);
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        
        console.log('Stream obtained:', stream);
        videoElement.srcObject = stream;
        updateStatus('✓ SUCCESS! Camera access granted!<br>Video stream is now active.<br>You should see video above.');
        startBtn.disabled = true;
        stopBtn.disabled = false;
        
      } catch (error) {
        console.error('Detailed error object:', error);
        let errorInfo = `
          ✗ <strong>Camera Error</strong><br>
          Error Type: ${error.name}<br>
          Error Message: ${error.message}<br>
          <br>
          <strong>Possible causes:</strong><br>
          • Camera permission denied by user<br>
          • Camera not available on device<br>
          • Browser doesn't support camera API<br>
          • Connection is not secure (need HTTPS)<br>
          <br>
          Try these steps:<br>
          1. Check Settings → Privacy → Camera<br>
          2. Make sure Safari/Chrome has camera access enabled<br>
          3. Try a different browser<br>
          4. Restart the app
        `;
        updateStatus(errorInfo);
      }
    });

    stopBtn.addEventListener('click', () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        videoElement.srcObject = null;
        updateStatus('⏸ Camera stopped. Click "Start Camera" to resume.');
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });

    stopBtn.disabled = true;

    // Log environment info on load
    window.addEventListener('load', logEnvironment);
  </script>
</body>
</html>
