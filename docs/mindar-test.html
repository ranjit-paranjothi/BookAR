<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple mindAR Test</title>
  <script async src="https://unpkg.com/es-module-shims@1.6.2/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.127.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.127.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import { MindARImageRunner, THREE } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js';
    
    const minderRunner = new MindARImageRunner({
      imageTargetSrc: 'assets/target-images/targets.mind'
    });

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = minderRunner.camera;

    // Create a cube
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const cube = new THREE.Mesh(geometry, material);
    
    const group = new THREE.Group();
    group.add(cube);
    scene.add(group);

    const anchor = minderRunner.addAnchor(0);
    anchor.group.add(group);

    minderRunner.on('targetFound', () => {
      console.log('✓ TARGET FOUND!');
      document.body.style.backgroundColor = 'rgba(0,255,0,0.1)';
    });

    minderRunner.on('targetLost', () => {
      console.log('✗ Target lost');
      document.body.style.backgroundColor = 'rgba(255,0,0,0.1)';
    });

    minderRunner.on('error', (error) => {
      console.error('Error:', error);
    });

    async function start() {
      await minderRunner.start();
      document.body.style.backgroundColor = 'rgba(0,0,255,0.1)';
      console.log('✓ mindAR started');
      
      renderer.setAnimationLoop((time) => {
        minderRunner.update();
        renderer.render(scene, camera);
      });
    }

    start().catch(e => console.error('Failed to start:', e));
  </script>
  <style>
    body { margin: 0; }
    canvas { display: block; }
  </style>
</head>
<body>
  <h1>mindAR Test (Loading...)</h1>
</body>
</html>
