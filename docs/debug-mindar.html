<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mindAR Debug</title>
  <script src="https://unpkg.com/three@r128/build/three.min.js"></script>
  <script src="https://unpkg.com/aframe@1.4.2/dist/aframe-master.min.js"></script>
  <script src="/mindar-image-aframe.prod.js"></script>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: monospace;
      background: #111;
      color: #0f0;
      font-size: 12px;
      overflow-y: auto;
    }
    #log {
      background: #000;
      border: 1px solid #0f0;
      padding: 10px;
      margin: 10px 0;
      height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    a-scene {
      width: 100%;
      height: 400px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h2>mindAR Diagnostic Test</h2>
  
  <div id="log">Initializing...</div>
  
  <a-scene mindar-image="imageTargetSrc: assets/target-images/targets.mind; autostart: true;" vr-mode-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box position="0 0 -0.5" scale="1 1 1" color="red"></a-box>
      <a-text value="TARGET DETECTED!" position="0 1 -0.5" color="white" scale="1 1 1" align="center"></a-text>
    </a-entity>
  </a-scene>

  <script>
    const logDiv = document.getElementById('log');
    let logText = '';

    function log(msg) {
      const timestamp = new Date().toLocaleTimeString();
      logText += `[${timestamp}] ${msg}\n`;
      logDiv.textContent = logText;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(msg);
    }

    log('Page loading...');
    log('MindAR version: ' + (window.MINDAR ? 'Loaded' : 'Not loaded'));
    log('Three.js: ' + (window.THREE ? 'Loaded' : 'Not loaded'));
    log('A-Frame: ' + (window.AFRAME ? 'Loaded' : 'Not loaded'));

    // Request camera permission early
    function requestCamera() {
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
          .then(() => log('✓ Camera permission granted - AR system should activate'))
          .catch(e => log('✗ Camera permission error: ' + e.message));
      }
    }

    // Check if mindar component is registered
    setTimeout(() => {
      if (window.AFRAME && window.AFRAME.components) {
        log('A-Frame components registered: ' + Object.keys(window.AFRAME.components).slice(0, 5).join(', ') + '...');
        log('mindar-image component registered: ' + ('mindar-image' in window.AFRAME.components));
      }
    }, 1000);

    document.addEventListener('DOMContentLoaded', () => {
      log('DOM ready');
      log('Requesting camera permissions...');
      setTimeout(requestCamera, 500);
      
      const scene = document.querySelector('a-scene');
      if (!scene) {
        log('✗ ERROR: a-scene not found!');
        return;
      }
      
      log('✓ a-scene found, waiting for events...');
      
      scene.addEventListener('loaded', () => {
        log('✓ Scene loaded');
      });

      scene.addEventListener('ready', () => {
        log('✓✓✓ AR SCENE READY - mindar initialized!');
      });

      scene.addEventListener('arReady', () => {
        log('✓ AR system ready');
      });

      scene.addEventListener('targetFound', (event) => {
        log('✓✓✓ TARGET FOUND! ✓✓✓');
        const targetIndex = (event.detail && event.detail.targetIndex) || (event.target && event.target.getAttribute('mindar-image-target')) || '0';
        log('Target detected (index: ' + targetIndex + ')');
        log('★ RED CUBE SHOULD NOW BE VISIBLE ★');
      });

      scene.addEventListener('targetLost', (event) => {
        log('✗ Target lost');
      });

      scene.addEventListener('error', (event) => {
        log('✗ ERROR: ' + (event.message || JSON.stringify(event)));
      });

      // Try to manually check .mind file from different paths
      log('Attempting to load .mind file from different paths...');
      
      const paths = [
        'assets/target-images/targets.mind',
        '/assets/target-images/targets.mind',
        './assets/target-images/targets.mind',
      ];
      
      async function testPath(path) {
        try {
          const response = await fetch(path);
          log(`[${path}] Status: ${response.status}`);
          
          if (response.ok) {
            const buffer = await response.arrayBuffer();
            log(`✓ [${path}] Successfully loaded ${buffer.byteLength} bytes`);
          } else {
            log(`✗ [${path}] HTTP Error ${response.status}`);
          }
        } catch (e) {
          log(`✗ [${path}] Error: ${e.message}`);
        }
      }
      
      Promise.all(paths.map(testPath)).then(() => {
        log('File fetch tests complete. Check if any returned ✓ with byte count.');
      });

      log('Waiting for target detection... Point camera at your target image.');
    });

    // Check for library load errors
    window.addEventListener('error', (event) => {
      log('✗ JavaScript Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno);
    });
  </script>
</body>
</html>
